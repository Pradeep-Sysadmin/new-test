name: Deploy Python Docker App to EC2

on:
  push:
    branches:
      - main

jobs:

  # ---------------------------------
  # 1. Gitleaks Secret Scan
  # ---------------------------------
  gitleaks-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gitleaks Setup
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Gitleaks Scan
        run: |
          gitleaks detect --source . --exit-code 1

  
  # ---------------------------------
  # 3. Trivy Vulnerability Scan
  # ---------------------------------
  trivy-scan:
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image Again
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-python-app:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/flask-python-app:${{ github.sha }}
          format: table
          # exit-code: 1
          # ignore-unfixed: true
          # vuln-type: "os,library"
          # severity: "CRITICAL,HIGH"

  # ---------------------------------
  # 4. Push Docker Image
  # ---------------------------------
      
      # - name: Push Docker Image
      #   run: |
      #     docker push ${{ secrets.DOCKER_USERNAME }}/flask-python-app:${{ github.sha }}
