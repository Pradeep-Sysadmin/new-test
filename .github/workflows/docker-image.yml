name: Deploy Python Docker App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout Source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 - Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 - Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-python-app .

      # Step 4 - Push Docker Image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hello-python-app

      # Step 5 - Deploy on EC2 using SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop old container if exists
            docker stop hello-python-container || true
            docker rm hello-python-container || true

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/hello-python-app

            # Run new container
            docker run -d \
              --name hello-python-container \
              -p 80:5000 \
              ${{ secrets.DOCKER_USERNAME }}/hello-python-app
